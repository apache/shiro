---
github:
  description: "Apache Shiro is a powerful and easy-to-use Java security framework \
  that performs authentication, authorization, cryptography, and session management"
  homepage: https://shiro.apache.org/
  dependabot_alerts: true
  protected_branches: ~
  features:
    wiki: false
    issues: true
    projects: true
    discussions: true
  enabled_merge_buttons:
    squash: true
    merge: true
    rebase: false
  rulesets:
    - name: "Branch Protection"
      type: branch
      branches:
        includes:
          - "main"
          - "2.x"
          - "1.13.x"
          - "release/*"
        excludes: []
      bypass_teams:
        - "apache/shiro-private"
      restrict_deletion: true
      restrict_force_push: true
      required_signatures: false
      required_linear_history: true
      required_conversation_resolution: false
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_last_push_approval: false
        require_code_owner_reviews: false
        required_approving_review_count: 0
      required_status_checks:
        - name: "build"
          app_slug: "github-actions"
notifications:
  pullrequests: commits@shiro.apache.org
  commits: commits@shiro.apache.org
  issues: issues@shiro.apache.org
  discussions: issues@shiro.apache.org
  jira_options: link label worklog
